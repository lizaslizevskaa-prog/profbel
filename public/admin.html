<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProfBel | Панель Администратора</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-main text-light min-vh-100">
    <div class="container py-5">
      <div
        class="d-flex justify-content-between align-items-center mb-5 border-bottom custom-border pb-3"
      >
        <h1 class="fw-bold">
          <i class="fas fa-crown text-warning me-3"></i>Панель Администратора
        </h1>
        <a href="index.html" class="btn btn-outline-cyan">Вернуться на сайт</a>
      </div>

      <div class="row g-4">
        <div class="col-md-6">
          <div class="detail-card p-4 rounded-4 h-100 bg-surface">
            <h4 class="fw-bold mb-4 text-cyan">Добавить новую профессию</h4>
            <form id="addProfForm">
              <div class="mb-3">
                <input
                  type="text"
                  id="profTitle"
                  class="form-control custom-input text-light"
                  placeholder="Название профессии"
                  required
                />
              </div>
              <div class="mb-3">
                <input
                  type="text"
                  id="profDir"
                  class="form-control custom-input text-light"
                  placeholder="Направление (например: IT)"
                  required
                />
              </div>
              <div class="mb-3">
                <textarea
                  id="profDesc"
                  class="form-control custom-input text-light"
                  rows="3"
                  placeholder="Описание профессии"
                  required
                ></textarea>
              </div>
              <div class="row mb-3">
                <div class="col-6">
                  <input
                    type="number"
                    id="salMin"
                    class="form-control custom-input text-light"
                    placeholder="ЗП от (BYN)"
                    required
                  />
                </div>
                <div class="col-6">
                  <input
                    type="number"
                    id="salMax"
                    class="form-control custom-input text-light"
                    placeholder="ЗП до (BYN)"
                    required
                  />
                </div>
              </div>
              <button type="submit" class="btn btn-accent-glow w-100">
                Добавить в базу
              </button>
            </form>
          </div>
        </div>

        <div class="col-md-6">
          <div class="detail-card p-4 rounded-4 h-100 bg-surface">
            <h4 class="fw-bold mb-4 text-purple">Статистика платформы</h4>
            <ul class="list-unstyled">
              <li
                class="mb-3 p-3 bg-dark rounded-3 border custom-border d-flex justify-content-between"
                style="background-color: var(--bg-dark) !important"
              >
                <span>Зарегистрировано пользователей:</span
                ><span class="fw-bold text-cyan">24</span>
              </li>
              <li
                class="mb-3 p-3 bg-dark rounded-3 border custom-border d-flex justify-content-between"
                style="background-color: var(--bg-dark) !important"
              >
                <span>Пройдено тестов:</span
                ><span class="fw-bold text-purple">156</span>
              </li>
            </ul>
            <div
              class="alert alert-warning mt-4 small border-purple bg-purple-soft text-light"
            >
              <i class="fas fa-info-circle me-2"></i> Внимание! Чтобы изменения
              появлялись на сайте динамически, на следующем этапе мы перенесем
              файл <code>data.js</code> в базу данных MongoDB.
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const user = JSON.parse(localStorage.getItem("user"));
        // Блокировка доступа для не-админов
        if (!user || user.role !== "admin") {
          document.body.innerHTML =
            '<div class="text-center mt-5 py-5"><h1 class="text-danger fw-bold mb-3"><i class="fas fa-exclamation-triangle"></i> ДОСТУП ЗАПРЕЩЕН</h1><a href="index.html" class="btn btn-outline-cyan">На главную</a></div>';
        }

        document
          .getElementById("addProfForm")
          ?.addEventListener("submit", (e) => {
            e.preventDefault();
            alert(
              "Запрос на добавление отправлен! На следующем этапе мы свяжем эту форму с MongoDB.",
            );
          });
      });
    </script>
  </body>
</html>
